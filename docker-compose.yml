version: '3.8'

services:
  dynamodb-local:
    image: amazon/dynamodb-local:latest
    container_name: ecommerce-dynamodb
    ports:
      - "8000:8000"
    command: "-jar DynamoDBLocal.jar -sharedDb -inMemory"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/ || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5

  setup-tables:
    image: amazon/aws-cli:latest
    depends_on:
      dynamodb-local:
        condition: service_healthy
    environment:
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
      AWS_DEFAULT_REGION: ap-southeast-2
    entrypoint: /bin/sh
    command:
      - -c
      - |
        for TABLE in ProductTable UserTable CartTable OrderTable; do
          aws dynamodb create-table \
            --table-name $$TABLE \
            --attribute-definitions \
              AttributeName=pk,AttributeType=S \
              AttributeName=sk,AttributeType=S \
            --key-schema \
              AttributeName=pk,KeyType=HASH \
              AttributeName=sk,KeyType=RANGE \
            --billing-mode PAY_PER_REQUEST \
            --endpoint-url http://dynamodb-local:8000 2>/dev/null || true
          echo "Table $$TABLE ready"
        done
        echo "All tables created"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ecommerce-frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:4000/
      - VITE_USER_POOL_ID=local_pool
      - VITE_USER_POOL_CLIENT_ID=local_client
    volumes:
      - ./frontend/src:/app/src
    depends_on:
      - dynamodb-local
